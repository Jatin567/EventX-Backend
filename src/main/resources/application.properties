spring.application.name=EventX

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/eventx_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
# Ensure the key is long enough for HS256 (32+ chars)
eventx.app.jwtSecret=EventX_Secure_Secret_Key_For_JWT_Authentication_2024_Longer_Version
eventx.app.jwtExpirationMs=86400000

# Logging for debugging
logging.level.com.event.eventx=DEBUG
logging.level.org.springframework.security=DEBUG

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Keep files in memory instead of writing to Tomcat temp (avoids FileNotFoundException)
spring.servlet.multipart.file-size-threshold=10MB
upload.dir=uploads

# Admin Registration Passcode (6-digit secret - change this before going to production)
admin.passcode=481632
